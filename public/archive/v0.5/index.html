<!DOCTYPE html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>護家神山 v0.5 舊版原型庫</title>
    <link rel="icon" type="image/png" href="../../app-icon.png" />
    <style>
      body {
        font-family: 'Noto Sans TC', 'PingFang TC', system-ui, sans-serif;
        background: #f3f1ed;
        color: #2c3338;
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }
      .card {
        max-width: 420px;
        background: #fff;
        border: 1px solid #e8e4dd;
        border-radius: 20px;
        padding: 28px 24px;
        box-shadow: 0 8px 24px rgba(45, 122, 112, 0.08);
      }
      .badge {
        display: inline-block;
        font-size: 11px;
        font-weight: 700;
        color: #b45309;
        background: #fffbeb;
        border: 1px solid rgba(217, 119, 6, 0.2);
        padding: 4px 10px;
        border-radius: 999px;
        margin-bottom: 12px;
      }
      h1 { font-size: 1.25rem; margin: 0 0 8px; }
      p { font-size: 0.9rem; line-height: 1.55; color: #4b5563; margin: 0 0 16px; }
      a {
        display: block;
        text-align: center;
        background: #2d7a70;
        color: #fff;
        text-decoration: none;
        font-weight: 600;
        padding: 12px 16px;
        border-radius: 12px;
      }
      a.secondary {
        margin-top: 10px;
        background: #fff;
        color: #2d7a70;
        border: 1px solid #d4efec;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <span class="badge">ARCHIVE · v0.5</span>
      <h1>護家神山舊版原型庫</h1>
      <p>
        此區為 v0.6.0 改版前的介面封存，與正式版 App 分離，不共用導覽與路由。
      </p>
      <a href="reminders.html">開啟「提醒」頁原型（v0.5）</a>
      <a class="secondary" href="../../">返回最新版 App</a>
    </div>
  </body>
</html>
